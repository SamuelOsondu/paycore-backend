services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://paycore:paycore@postgres:5432/paycore
      SYNC_DATABASE_URL: postgresql+psycopg2://paycore:paycore@postgres:5432/paycore
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://paycore:paycore@postgres:5432/paycore
      SYNC_DATABASE_URL: postgresql+psycopg2://paycore:paycore@postgres:5432/paycore
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  beat:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://paycore:paycore@postgres:5432/paycore
      SYNC_DATABASE_URL: postgresql+psycopg2://paycore:paycore@postgres:5432/paycore
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paycore
      POSTGRES_PASSWORD: paycore
      POSTGRES_DB: paycore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paycore"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  flower:
    build: .
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    volumes:
      - .:/app
    command: celery -A app.workers.celery_app flower --port=5555
    profiles:
      - monitoring

volumes:
  postgres_data:
